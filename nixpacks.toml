# Railway-ga ham Node, ham Python kerakligini aytamiz
providers = ["node", "python"]

[phases.setup]
# Tizimga kerakli dasturlarni o'rnatamiz
nixPkgs = ["nodejs", "python311", "python311Packages.pip"]

[phases.install]
# Har ikkala til uchun kutubxonalarni o'rnatamiz
cmds = [
    "npm install",
    "python3 -m pip install -r requirements.txt"
]

[start]
# Botni va serverni ishga tushirish buyrug'i
cmd = "npx tsx server.ts"